<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SFS 行星包生成器</title>
<style>
:root{
  --bg:#fafafa; --surface:#fff; --surface-2:#f5f5f5; --surface-3:#efefef;
  --text:#111; --text-muted:#777; --text-faint:#aaa;
  --border:#e0e0e0; --border-strong:#bbb;
  --radius:2px;
  --shadow:0 1px 2px rgba(0,0,0,0.04);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,'PingFang SC','Microsoft YaHei',sans-serif;
  background:var(--bg); color:var(--text); font-size:15px; line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
.app{margin:0 auto;padding:6px;}
header{padding:14px 4px 10px;border-bottom:1px solid var(--border);margin-bottom:8px;}
header h1{
  font-size:2rem;font-weight:400;letter-spacing:0.08em;
  font-family:'Noto Serif SC','Source Han Serif SC','SimSun','STSong','Georgia','Times New Roman',serif;
}
header .subtitle-divider{
  width:40px;height:1px;background:var(--text);margin:12px 0;
}
header p{color:var(--text-muted);font-size:1rem;font-weight:400;letter-spacing:0.12em;text-transform:uppercase;}

.toolbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;align-items:center;}
.btn{
  padding:8px 16px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;
  font-size:1rem;font-weight:500;background:var(--surface);color:var(--text);
  transition:all .15s;white-space:nowrap;font-family:inherit;
}
.btn:hover{border-color:var(--text);}
.btn-primary{background:var(--text);color:#fff;border-color:var(--text);}
.btn-primary:hover{background:#000;}
.btn-sm{padding:5px 10px;font-size:1rem;}
.btn-block{width:100%;}

.main-grid{display:grid;grid-template-columns:1fr;gap:12px;position:relative;}
@media(min-width:640px){.main-grid{grid-template-columns:1fr 1fr;}}
@media(min-width:960px){.main-grid{grid-template-columns:2fr 1fr;}}
@media(min-width:1280px){.main-grid{grid-template-columns:2.5fr 1fr;}}

.sidebar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;height:fit-content;max-height:calc(100vh - 110px);display:flex;flex-direction:column;}
@media(max-width:639px){
  .sidebar{position:absolute;left:0;top:0;width:260px;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,0.15);transform:translateX(-110%);transition:transform .25s;}
  .sidebar.open{transform:translateX(0);}
  .sidebar-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.2);z-index:99;display:none;}
  .sidebar-backdrop.show{display:block;}
}
.sidebar-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.sidebar-head h3{font-size:0.92rem;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);}
.tree{flex:1;overflow:auto;font-size:0.92rem;}
.tree-node{}
.tree-row{
  display:flex;align-items:center;gap:4px;padding:5px 6px;border-radius:var(--radius);cursor:pointer;
  border:1px solid transparent;margin-bottom:1px;
}
.tree-row:hover{background:var(--surface-2);}
.tree-row.active{background:var(--surface-3);border-color:var(--border-strong);}
.tree-toggle{width:14px;text-align:center;color:var(--text-muted);cursor:pointer;font-size:0.78rem;flex-shrink:0;user-select:none;}
.tree-name{flex:1;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tree-meta{font-size:0.82rem;color:var(--text-faint);white-space:nowrap;margin-left:4px;}
.tree-info{display:flex;align-items:baseline;min-width:0;flex:1;}
.tree-type{font-size:0.92rem;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.04em;}
.tree-actions{display:flex;gap:2px;opacity:0;transition:opacity .15s;}
.tree-row:hover .tree-actions,.tree-row.active .tree-actions{opacity:1;}
.tree-act{
  width:20px;height:20px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;
  border-radius:2px;font-size:0.88rem;line-height:1;display:flex;align-items:center;justify-content:center;
}
.tree-act:hover{background:var(--surface);color:var(--text);}
.tree-empty{color:var(--text-muted);text-align:center;padding:24px 8px;font-size:1rem;}

.content{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;min-height:400px;}
.right-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow-y:auto;max-height:calc(100vh - 110px);padding:14px;}
.right-panel .section-title{font-size:0.82rem;margin:12px 0 8px;}
@media(max-width:639px){
  .main-grid{grid-template-columns:1fr !important;}
  .right-panel{max-height:none;padding:10px;}
  .right-panel canvas{width:100% !important;height:auto !important;}
}
@media(min-width:640px) and (max-width:959px){
  .main-grid{grid-template-columns:1.8fr 1fr !important;}
}
.tabs{display:flex;overflow-x:auto;border-bottom:1px solid var(--border);scrollbar-width:thin;}
.tabs::-webkit-scrollbar{height:4px;}
.tabs::-webkit-scrollbar-thumb{background:var(--border);}
.tab{
  padding:11px 14px;cursor:pointer;border:none;background:none;color:var(--text-muted);
  font-size:0.88rem;font-weight:500;white-space:nowrap;border-bottom:2px solid transparent;
  transition:all .15s;font-family:inherit;
}
.tab:hover{color:var(--text);}
.tab.active{color:var(--text);border-bottom-color:var(--text);}
.tab-content{display:none;padding:10px;}
.tab-content.active{display:block;}

.tabs{flex-wrap:wrap;}
.tab{padding:6px 7px;font-size:0.92rem;}
.tab-mob{display:none;margin-bottom:14px;}
.tab-mob select{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:0.92rem;font-family:inherit;}
@media(max-width:639px){
  .tabs{display:none;}
  .tab-mob{display:block;}
}

.section-title{font-size:0.92rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--text);margin:14px 0 8px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.section-title:first-child{margin-top:0;}
.form-row{display:grid;grid-template-columns:1fr;gap:8px;}
@media(min-width:620px){.form-row{grid-template-columns:1fr 1fr;}}
.form-row-3{display:grid;grid-template-columns:1fr;gap:8px;}
@media(min-width:620px){.form-row-3{grid-template-columns:1fr 1fr 1fr;}}
.form-group{margin-bottom:10px;}
.form-group label{display:block;margin-bottom:5px;font-size:0.92rem;font-weight:500;color:var(--text-muted);}
.form-group input[type="text"],.form-group input[type="number"],.form-group select,.form-group textarea{
  width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);
  background:var(--bg);color:var(--text);font-size:0.92rem;outline:none;font-family:inherit;transition:border-color .15s;
}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--text);}
.form-group textarea{resize:vertical;min-height:60px;font-family:'SF Mono',Consolas,monospace;font-size:0.92rem;}
.formula-area{min-height:120px!important;}

.checkbox-wrapper{display:flex;align-items:center;gap:8px;min-height:34px;}
.checkbox-wrapper input[type="checkbox"]{width:16px;height:16px;accent-color:var(--text);cursor:pointer;flex-shrink:0;}
.checkbox-wrapper label{margin:0;font-size:1rem;color:var(--text);font-weight:400;cursor:pointer;}

.color-input-wrapper{display:flex;align-items:center;gap:8px;}
.color-input-wrapper input[type="color"]{width:38px;height:34px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;padding:2px;background:var(--surface);flex-shrink:0;}
.color-values{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;width:150px;flex-shrink:0;}
.color-values input{padding:6px 8px!important;font-size:0.92rem!important;}
.color-alpha{width:60px!important;flex:0 0 auto!important;}
.xy-inputs{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

.help-text{font-size:0.92rem;color:var(--text-muted);margin-top:4px;font-weight:300;line-height:1.4;}

.enable-section{background:var(--surface-2);padding:10px 12px;border-radius:var(--radius);border:1px solid var(--border);margin-bottom:14px;}
.enable-section .checkbox-wrapper label{font-weight:600;color:var(--text);}

.array-item{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:10px;}
.array-item-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.array-item-title{font-weight:600;font-size:0.88rem;}
.icon-btn{
  width:24px;height:24px;border:1px solid var(--border);background:var(--surface);color:var(--text-muted);
  cursor:pointer;border-radius:2px;font-size:1rem;line-height:1;display:flex;align-items:center;justify-content:center;
}
.icon-btn:hover{color:var(--text);border-color:var(--text);}
.add-btn-wrap{margin-top:6px;}

.preview-wrap{display:flex;flex-direction:column;align-items:center;gap:16px;}
#planetCanvas{background:transparent;border-radius:50%;max-width:100%;height:auto;}
.preview-info{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:380px;}
.preview-info-item{background:var(--surface-2);padding:8px;border-radius:var(--radius);text-align:center;border:1px solid var(--border);}
.preview-info-label{font-size:1rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.04em;}
.preview-info-value{font-size:1rem;font-weight:600;margin-top:2px;}
.json-preview{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;font-family:'SF Mono',Consolas,monospace;font-size:0.92rem;white-space:pre-wrap;word-break:break-all;max-height:380px;overflow:auto;color:var(--text);}

.export-grid{display:grid;grid-template-columns:1fr;gap:14px;}
@media(min-width:700px){.export-grid{grid-template-columns:1fr 1fr;}}
.export-card{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;}
.export-card h4{font-size:0.92rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px;color:var(--text);}
.export-actions{display:flex;flex-direction:column;gap:8px;margin-top:14px;}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.04);display:none;align-items:center;justify-content:center;z-index:1000;padding:16px;backdrop-filter:blur(2px);}
.modal-overlay.active{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;max-width:460px;width:100%;max-height:90vh;overflow:auto;box-shadow:0 8px 30px rgba(0,0,0,0.08);}
.modal h2{font-size:1.1rem;font-weight:300;margin-bottom:14px;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:#fff;padding:10px 20px;border-radius:var(--radius);z-index:2000;opacity:0;transition:all .25s;font-size:1rem;box-shadow:0 4px 14px rgba(0,0,0,0.2);}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.toast.error{background:#a33;}

.empty-state{text-align:center;padding:50px 20px;color:var(--text-muted);}
.empty-state h3{font-weight:300;font-size:1.1rem;margin-bottom:8px;color:var(--text);}
.empty-state p{font-size:0.92rem;}

.spacer{flex:1;}
.hint{font-size:0.92rem;color:var(--text-muted);font-weight:300;}
select{cursor:pointer;}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>SFS 行星包生成器</h1>
    <div class="subtitle-divider"></div>
    <p>Space Flight Simulator Planet Pack Editor</p>
  </header>

  <div class="toolbar">
    <button class="btn" onclick="toggleSidebar()" id="sidebarToggle" style="display:none">&#9776;</button>
    <button class="btn btn-primary" onclick="newProject()">新建项目</button>
    <button class="btn" onclick="showAddBodyModal()">添加天体</button>
    <div class="spacer"></div>
    <span class="asset-info" id="assetInfo" style="font-size:0.82rem;color:var(--text-muted);white-space:nowrap;"></span>
    <button class="btn" onclick="showTextureCreator()">纹理创建</button>
    <button class="btn" onclick="showAssetManager()">资源管理</button>
    <button class="btn" onclick="saveProject()">保存项目</button>
    <button class="btn" onclick="document.getElementById('projFile').click()">打开项目</button>
    <button class="btn" onclick="document.getElementById('packFiles').click()">导入行星包</button>
    <button class="btn btn-primary" onclick="exportPlanetPack()">导出行星包</button>
    <input type="file" id="projFile" accept=".sfsproj,.json" style="display:none" onchange="openProject(event)">
    <input type="file" id="packFiles" accept=".txt,.json" multiple style="display:none" onchange="importPackFiles(event)">
  </div>

  <div class="main-grid">
    <div class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <h3>天体层级</h3>
        <button class="btn btn-sm" onclick="showAddBodyModal()">+ 添加</button>
        <button class="btn btn-sm" onclick="toggleSidebar()" style="margin-left:auto;display:none" id="sidebarClose">&times;</button>
      </div>
      <div class="tree" id="tree"></div>
    </div>
    <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="toggleSidebar()"></div>

    <div class="content" id="editorContent" style="display:none">
      <div class="tabs" id="tabs"></div>
      <div class="tab-mob" id="tabMob"></div>
      <div id="tabContent"></div>
    </div>
    <div class="right-panel" id="rightPanel" style="display:none;">
      <div id="rightPanelContent"></div>
    </div>
    <div class="content" id="emptyState">
      <div class="empty-state">
        <h3>欢迎使用 SFS 行星包生成器</h3>
        <p>点击「新建项目」开始创建一个包含中心天体的行星包，或「打开项目」加载已有 .sfsproj 文件。</p>
      </div>
    </div>
  </div>
</div>

<!-- Add Body Modal -->
<div class="modal-overlay" id="addBodyModal">
  <div class="modal">
    <h2>添加天体</h2>
    <div class="form-group">
      <label>模板</label>
      <select id="tplSelect"></select>
    </div>
    <div class="form-group">
      <label>名称</label>
      <input type="text" id="addBodyName" placeholder="天体名称">
    </div>
    <div class="form-group">
      <label>母星 (留空则为中心天体)</label>
      <select id="parentSelect"></select>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('addBodyModal')">取消</button>
      <button class="btn btn-primary" onclick="addBody()">添加</button>
    </div>
  </div>
</div>

<!-- Import Text Modal -->
<div class="modal-overlay" id="importModal">
  <div class="modal">
    <h2>导入行星 TXT</h2>
    <div class="form-group">
      <label>粘贴 SFS 行星 JSON 内容</label>
      <textarea id="importText" style="min-height:220px;font-family:monospace;font-size:1rem;"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('importModal')">取消</button>
      <button class="btn btn-primary" onclick="importFromText()">导入</button>
    </div>
  </div>
</div>

<!-- Template Import Modal -->
<div class="modal-overlay" id="templateImportModal">
  <div class="modal" style="max-width:360px;">
    <h2>从模板导入</h2>
    <div style="margin-bottom:10px;font-size:0.9rem;color:var(--text-muted);">选择一个模板天体：</div>
    <div id="templateImportList" style="max-height:320px;overflow:auto;border:1px solid var(--border);border-radius:var(--radius);"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('templateImportModal')">取消</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Asset Manager Modal -->
<div class="modal-overlay" id="assetModal">
  <div class="modal" style="max-width:520px;">
    <h2>资源缓存管理</h2>
    <div id="assetStats" style="margin-bottom:14px;font-size:0.9rem;"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('assetModal')">关闭</button>
      <button class="btn" onclick="clearAssetCache()">清除全部缓存</button>
    </div>
  </div>
</div>

<!-- Texture Creator Modal -->
<div class="modal-overlay" id="textureModal">
  <div class="modal" style="max-width:700px;">
    <h2>纹理创建工具</h2>
    <div style="display:grid;grid-template-columns:1fr 1.5fr;gap:14px;margin-bottom:14px;">
      <div>
        <div class="form-group">
          <label>纹理类型</label>
          <select id="texType" onchange="regenTexture()">
            <option value="rocky">岩石/陆地</option>
            <option value="gas">气态巨行星</option>
            <option value="ice">冰冻</option>
            <option value="cloud">云层</option>
          </select>
        </div>
        <div class="form-group">
          <label>种子</label>
          <input type="number" id="texSeed" value="1" min="0" max="9999" onchange="regenTexture()">
        </div>
        <div class="form-group">
          <label>主色调</label>
          <input type="color" id="texColor1" value="#8B4513" onchange="regenTexture()">
        </div>
        <div class="form-group">
          <label>辅色调</label>
          <input type="color" id="texColor2" value="#228B22" onchange="regenTexture()">
        </div>
        <div class="form-group">
          <label>噪声强度</label>
          <input type="range" id="texNoise" min="0" max="100" value="50" oninput="regenTexture()">
        </div>
        <div class="form-group">
          <label>细节层次</label>
          <input type="range" id="texDetail" min="1" max="8" value="4" oninput="regenTexture()">
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
        <canvas id="texCanvas" width="256" height="256" style="border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:256px;height:auto;"></canvas>
        <button class="btn btn-primary" onclick="downloadTexture()">下载纹理 (PNG)</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('textureModal')">关闭</button>
      <button class="btn btn-primary" onclick="saveTextureToCache()">保存到缓存</button>
    </div>
  </div>
</div>

<script>
"use strict";
/* ============================================================
   STATE
============================================================ */
const state = {
  planets: [],
  activeId: null,
  activeTab: 'base',
  expanded: {},
  packInfo: {
    name: 'MyPlanetPack',
    authorName: '',
    version: '1.0',
    description: '',
    includeDefaultPlanets: false,
    includeDefaultHeightmaps: true,
    includeDefaultTextures: true,
    hideStarsInAtmosphere: true
  },
  spaceCenter: {
    address: 'Earth',
    angle: 90,
    position_LaunchPad: {
      horizontalPosition: 365,
      height: 56.2
    }
  },
  assetCache: { textures: 0, presets: 0 },
  _orbitViewMode: 'children'
};

let _idc = 0;
function uid(){ return 'b' + (++_idc) + '_' + Math.random().toString(36).slice(2,7); }
function currentPlanet(){ return state.planets.find(p => p._id === state.activeId) || null; }

/* ============================================================
   TABS
============================================================ */
const TABS = [
  { id:'base',         label:'基础数据' },
  { id:'atmoPhys',     label:'大气物理' },
  { id:'atmoVis',      label:'大气视觉' },
  { id:'frontClouds',  label:'远景云层' },
  { id:'terrain',      label:'地形纹理' },
  { id:'water',        label:'水体' },
  { id:'rings',        label:'光环' },
  { id:'postprocess',  label:'后处理' },
  { id:'orbit',        label:'轨道' },
  { id:'landmarks',    label:'地标' },
  { id:'achievements', label:'成就' },
  { id:'textures',     label:'纹理' },
  { id:'export',       label:'导出' }
];

/* ============================================================
   DEFAULT OBJECTS
============================================================ */
const DEFAULT_ATMO_PHYSICS = {
  height: 40000, density: 0.005, curve: 10, parachuteMultiplier: 1,
  upperAtmosphere: 0.333, shockwaveIntensity: 1, minHeatingVelocityMultiplier: 1
};
const DEFAULT_CLOUDS = { texture:'Earth_Clouds', startHeight:1200, width:40845, height:36000, alpha:0.1, velocity:2 };
const DEFAULT_FOG = { keys:[
  { color:{r:0.46,g:0.46,b:0.36,a:0.098}, distance:500 },
  { color:{r:0.65,g:0.85,b:0.89,a:0.118}, distance:3000 },
  { color:{r:0.65,g:0.85,b:1,a:0.416}, distance:30000 }
]};
const DEFAULT_ATMO_VISUALS = {
  GRADIENT:{ texture:'Atmo_Earth', height:45000, positionZ:4000 },
  CLOUDS: JSON.parse(JSON.stringify(DEFAULT_CLOUDS)),
  FOG: JSON.parse(JSON.stringify(DEFAULT_FOG))
};
const DEFAULT_FRONT_CLOUDS = {
  cloudsTexture:'Earth_Clouds_Front', cloudTextureCutout:1, fadeZoneHeight:5000,
  height:50000, positionZ:0, sharpenAlpha:false
};
const DEFAULT_WATER = {
  oceanMaskTexture:'Earth_OceanMask_V2', lowerTerrain:false, oceanDepth:1000,
  sand:{r:0.76,g:0.7,b:0.5,a:1}, floor:{r:0.1,g:0.2,b:0.3,a:1},
  shallow:{r:0.3,g:0.5,b:0.7,a:1}, deep:{r:0.05,g:0.1,b:0.2,a:1},

function buildPlanetFromTemplate(tpl, name, parentName){
  const p = buildSkeleton(name || tpl.name, parentName || tpl.parent);
  const d = p.BASE_DATA;
  d.radius = tpl.radius;
  d.gravity = tpl.gravity;
  d.mapColor = { r: tpl.color.r, g: tpl.color.g, b: tpl.color.b, a: 1 };
  const hasAtmo = !!tpl.atmo;
  if (hasAtmo) {
    const ah = tpl.atmoH || 40000;
    d.timewarpHeight = Math.round(ah * 0.8);
    d.velocityArrowsHeight = Math.round(d.timewarpHeight * 0.2);
    p.ATMOSPHERE_PHYSICS_DATA = {
      height: ah, density: tpl.atmoD || 0.005, curve: 10, parachuteMultiplier: 1,
      upperAtmosphere: 0.333, shockwaveIntensity: 1, minHeatingVelocityMultiplier: 1
    };
    p.ATMOSPHERE_VISUALS_DATA = JSON.parse(JSON.stringify(DEFAULT_ATMO_VISUALS));
  } else {
    d.timewarpHeight = tpl.radius > 500000 ? Math.round(tpl.radius / 25) : Math.round(tpl.radius / 10);
    d.velocityArrowsHeight = Math.max(100, Math.round(d.timewarpHeight * 0.2));
  }
  p.TERRAIN_DATA.TERRAIN_TEXTURE_DATA.planetTexture = tpl.texture;
  p.TERRAIN_DATA.collider = !tpl.isStar && !tpl.isGas;
  p.TERRAIN_DATA.rocks = (tpl.isStar || tpl.isGas) ? null : JSON.parse(JSON.stringify(DEFAULT_ROCKS));
  if (tpl.rings) p.RINGS_DATA = makeRings(tpl.radius);
  p.ORBIT_DATA.semiMajorAxis = tpl.sma || 0;
  p.ACHIEVEMENT_DATA = {
    Landed: !tpl.isStar && !tpl.isGas,
    Takeoff: !tpl.isStar && !tpl.isGas,
    Atmosphere: hasAtmo,
    Orbit: true,
    Crash: !tpl.isStar
  };
  if (tpl.isStar) {
    d.mapColor = { r:1, g:0.85, b:0.2, a:1 };
  }
  return p;
}

/* ============================================================
   PATH HELPERS
============================================================ */
function getValueAtPath(obj, path){
  const parts = path.split('.');
  let cur = obj;
  for (const p of parts){ if (cur == null) return undefined; cur = cur[p]; }
  return cur;
}
function setValueAtPath(obj, path, value){
  const parts = path.split('.');
  let cur = obj;
  for (let i = 0; i < parts.length - 1; i++){
    if (cur[parts[i]] == null) cur[parts[i]] = {};
    cur = cur[parts[i]];
  }
  cur[parts[parts.length - 1]] = value;
}
function deepMerge(target, source){
  if (!source) return target;
  for (const key in source){
    if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key])){
      if (typeof target[key] !== 'object' || target[key] === null) target[key] = {};
      deepMerge(target[key], source[key]);
    } else {
      target[key] = source[key];
    }
  }
  return target;
}

/* ============================================================
   FORMAT / COLOR HELPERS
============================================================ */
function esc(s){
  return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function fmtNum(n){
  n = Number(n) || 0;
  if (Math.abs(n) >= 1e12) return (n/1e12).toFixed(1)+'T';
  if (Math.abs(n) >= 1e9)  return (n/1e9).toFixed(1)+'B';
  if (Math.abs(n) >= 1e6)  return (n/1e6).toFixed(1)+'M';
  if (Math.abs(n) >= 1e3)  return (n/1e3).toFixed(1)+'K';
  return String(n);
}
function rgbToHex(r,g,b){
  const h = v => Math.max(0,Math.min(255,Math.round(v*255))).toString(16).padStart(2,'0');
  return '#' + h(r) + h(g) + h(b);
}
function hexToRgb(hex){
  hex = hex.replace('#','');
  return { r: parseInt(hex.slice(0,2),16)/255, g: parseInt(hex.slice(2,4),16)/255, b: parseInt(hex.slice(4,6),16)/255 };
}
function lighten(c, amt){
  return { r: Math.min(1,c.r+amt), g: Math.min(1,c.g+amt), b: Math.min(1,c.b+amt) };
}
function darken(c, amt){
  return { r: Math.max(0,c.r-amt), g: Math.max(0,c.g-amt), b: Math.max(0,c.b-amt) };
}

/* 公式解析 */
function parseFormulaLine(line){
  var m = line.trim().match(/^OUTPUT\s*=\s*(\w+)\((.+)\)$/);
  if (!m) return null;
  return { func: m[1], params: m[2].split(',').map(function(s){return s.trim();}) };
}
function formulaToLine(item){
  if (item.func === 'Custom') return 'OUTPUT = ' + (item.params[0]||'');
  return 'OUTPUT = ' + item.func + '(' + item.params.join(',') + ')';
}

/* 地形/贴图公式结构化编辑器 */
var TERRAIN_FUNC_TYPES = ['AddHeightMap','AddNoise','AddCraters','AddRidges','Flat','AddMountains','AddCanyons','AddDunes','AddRocks','Custom'];
var TEXTURE_FUNC_TYPES = ['MapTexture','SetTexture','MultiplyTexture'];

function formulaEditorHTML(path, label, arr, funcTypes, help){
  var items = [];
  (arr||[]).forEach(function(line){
    var parsed = parseFormulaLine(line);
    if (parsed) items.push(parsed);
  });
  var html = '<div class="form-group"><label>'+label+'</label>';
  html += '<div id="fe_'+path.replace(/\./g,'_')+'" data-formula-path="'+path+'" data-formula-types="'+funcTypes.join(',')+'">';
  items.forEach(function(item, idx){
    html += formulaItemHTML(idx, item, funcTypes, path);
  });
  html += '</div>';
  html += '<div class="add-btn-wrap"><button class="btn btn-sm" onclick="addFormulaItem(\''+path+'\')">+ 添加条目</button></div>';
  if (help) html += '<div class="help-text">'+help+'</div>';
  html += '</div>';
  return html;
}
function formulaItemHTML(idx, item, funcTypes, path){
  var isCustom = (item.func === 'Custom');
  var typeOpts = funcTypes.map(function(f){
    return '<option value="'+f+'"'+(f===item.func?' selected':'')+'>'+f+'</option>';
  }).join('');
  var p1 = item.params[0]||'';
  var p2 = item.params[1]||'';
  var p3 = item.params[2]||'';
  var customStyle = isCustom ? '' : 'display:none;';
  var normalStyle = isCustom ? 'display:none;' : '';
  return '<div class="array-item" data-formula-idx="'+idx+'">'+
    '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">'+
      '<select data-fi-func style="width:130px;">'+typeOpts+'</select>'+
      '<span style="'+normalStyle+'" class="fi-normal">'+
        '<input type="text" data-fi-p0 value="'+esc(p1)+'" placeholder="参数1" style="width:80px;">'+
        '<input type="number" data-fi-p1 value="'+esc(p2)+'" placeholder="参数2" style="width:80px;">'+
        '<input type="number" data-fi-p2 value="'+esc(p3)+'" placeholder="参数3" style="width:80px;">'+
      '</span>'+
      '<span style="'+customStyle+'" class="fi-custom">'+
        '<input type="text" data-fi-custom value="'+esc(p1)+'" placeholder="自定义公式" style="flex:1;min-width:200px;">'+
      '</span>'+
      '<button class="icon-btn" onclick="removeFormulaItem(\''+path+'\','+idx+')" title="删除">x</button>'+
    '</div>'+
  '</div>';
}
function syncFormulaItems(path){
  var p = currentPlanet(); if (!p) return;
  var container = document.querySelector('[data-formula-path="'+path+'"]');
  if (!container) return;
  var funcTypes = (container.dataset.formulaTypes||'').split(',');
  var items = [];
  container.querySelectorAll('[data-formula-idx]').forEach(function(el){
    var idx = parseInt(el.dataset.formulaIdx);
    var func = el.querySelector('[data-fi-func]').value;
    if (func === 'Custom'){
      var cv = el.querySelector('[data-fi-custom]').value;
      items.push({ func:'Custom', params:[cv,'',''] });
    } else {
      items.push({
        func: func,
        params: [
          el.querySelector('[data-fi-p0]').value,
          el.querySelector('[data-fi-p1]').value,
          el.querySelector('[data-fi-p2]').value
        ]
      });
    }
  });
  var lines = items.map(formulaToLine);
  setValueAtPath(p, path, lines);
  onPlanetChange(path);
}
function addFormulaItem(path){
  var p = currentPlanet(); if (!p) return;
  var container = document.querySelector('[data-formula-path="'+path+'"]');
  if (!container) return;
  var funcTypes = (container.dataset.formulaTypes||'').split(',');
  var count = container.querySelectorAll('[data-formula-idx]').length;
  var newItem = { func: funcTypes[0], params:['1000','10','0'] };
  var tmp = document.createElement('div');
  tmp.innerHTML = formulaItemHTML(count, newItem, funcTypes, path);
  container.appendChild(tmp.firstElementChild);
  // attach listeners for the new item
  attachFormulaItemListeners(container.lastElementChild, path);
  syncFormulaItems(path);
}
function removeFormulaItem(path, idx){
  var container = document.querySelector('[data-formula-path="'+path+'"]');
  if (!container) return;
  var el = container.querySelector('[data-formula-idx="'+idx+'"]');
  if (el) el.remove();
  // re-index
  container.querySelectorAll('[data-formula-idx]').forEach(function(e, i){
    e.dataset.formulaIdx = i;
  });
  syncFormulaItems(path);
}
function attachFormulaItemListeners(el, path){
  el.querySelectorAll('[data-fi-func]').forEach(function(sel){
    sel.addEventListener('change', function(){
      var isCustom = (sel.value === 'Custom');
      el.querySelectorAll('.fi-normal').forEach(function(n){ n.style.display = isCustom ? 'none' : ''; });
      el.querySelectorAll('.fi-custom').forEach(function(n){ n.style.display = isCustom ? '' : 'none'; });
      syncFormulaItems(path);
      onPlanetChange(path);
    });
  });
  el.querySelectorAll('[data-fi-p0],[data-fi-p1],[data-fi-p2],[data-fi-custom]').forEach(function(inp){
    inp.addEventListener('input', function(){ syncFormulaItems(path); onPlanetChange(path); });
  });
}

/* ============================================================
   TREE RENDERING
============================================================ */
function buildTree(){
  const map = {};
  state.planets.forEach(p => map[p._id] = { planet:p, children:[] });
  const roots = [];
  state.planets.forEach(p => {
    const parentName = p.ORBIT_DATA && p.ORBIT_DATA.parent;
    const parent = parentName ? state.planets.find(q => q.name === parentName) : null;
    if (parent && map[parent._id] && parent._id !== p._id) {
      map[parent._id].children.push(map[p._id]);
    } else {
      roots.push(map[p._id]);
    }
  });
  return roots;
}
function renderTree(){
  const el = document.getElementById('tree');
  if (state.planets.length === 0){
    el.innerHTML = '<div class="tree-empty">暂无天体<br>点击「新建项目」开始</div>';
    return;
  }
  const roots = buildTree();
  let html = '';
  roots.forEach(node => { html += renderTreeNode(node, 0); });
  // orphans (shouldn't happen, but safety)
  el.innerHTML = html;
}
function renderTreeNode(node, depth){
  const p = node.planet;
  const hasKids = node.children.length > 0;
  const expanded = state.expanded[p._id] !== false;
  const toggle = hasKids ? '<span class="tree-toggle" onclick="event.stopPropagation();toggleExpand(\''+p._id+'\')">'+(expanded?'v':'>')+'</span>' : '<span class="tree-toggle"></span>';
  const typeLabel = p._type === 'Center' ? '中心' : (p.ORBIT_DATA.parent ? '卫星' : '行星');
  const radiusStr = _formatRadius(p.BASE_DATA.radius);
  const smaStr = (p.ORBIT_DATA && p.ORBIT_DATA.semiMajorAxis) ? _formatSMA(p.ORBIT_DATA.semiMajorAxis) : '';
  const infoParts = [radiusStr, smaStr].filter(Boolean);
  const infoText = infoParts.length ? ' (' + infoParts.join(', ') + ')' : '';
  let html = '<div class="tree-row '+(p._id===state.activeId?'active':'')+'" style="margin-left:'+(depth*14)+'px" onclick="selectPlanet(\''+p._id+'\')">'+
    toggle +
    '<span class="tree-info" oncontextmenu="event.preventDefault();event.stopPropagation();showTreeContextMenu(event,\''+p._id+'\')"><span class="tree-name">'+esc(p.name)+'</span><span class="tree-meta">'+infoText+'</span></span>'+
    '<span class="tree-actions">'+
      '<button class="tree-act" onclick="event.stopPropagation();addChildOf(\''+p._id+'\')" title="添加子天体">+</button>'+
      '<button class="tree-act" onclick="event.stopPropagation();duplicatePlanet(\''+p._id+'\')" title="复制">=</button>'+
      '<button class="tree-act" onclick="event.stopPropagation();deletePlanet(\''+p._id+'\')" title="删除">x</button>'+
    '</span></div>';
  if (hasKids && expanded){
    node.children.forEach(c => { html += renderTreeNode(c, depth+1); });
  }
  return html;
}
function _formatRadius(m){
  if (!m) return '';
  if (m >= 1e9) return (m/1.496e11).toFixed(2)+' AU';
  if (m >= 1e6) return (m/1000).toFixed(0)+' km';
  return m.toFixed(0)+' m';
}
function _formatSMA(m){
  if (!m) return '';
  if (m >= 1e11) return (m/1.496e11).toFixed(2)+' AU';
  if (m >= 1e9) return (m/1e9).toFixed(2)+' Mm';
  if (m >= 1e6) return (m/1e6).toFixed(1)+' Gm';
  if (m >= 1e3) return (m/1e3).toFixed(0)+' km';
  return m.toFixed(0)+' m';
}
function toggleExpand(id){ state.expanded[id] = !state.expanded[id]; renderTree(); }

  state.activeTab = id;

function renderActiveTab(){
  const p = currentPlanet();
  const el = document.getElementById('tabContent');

  if (!p){ el.innerHTML = ''; rpEl.style.display='none'; rpContent.innerHTML=''; return; }

  // Right panel: always show preview + orbit view when a planet is selected
  rpEl.style.display = '';
  let rpHtml = '';

  rpHtml += renderPreview(p);

    case 'base': html = renderBase(p); break;

      html = '<div style="padding:40px;text-align:center;color:var(--text-muted);">预览和轨道视图已移至右侧面板</div>';
      break;
    case 'export': html = renderExport(p); break;
  }
  el.innerHTML = html;
}

/* ============================================================
   TERRAIN PREVIEW (POLAR CONTOUR)
============================================================ */
function drawTerrainPreview(){
  var canvas = document.getElementById('terrainPreviewCanvas');
  if (!canvas) return;
  var p = currentPlanet(); if (!p) return;
  var ctx = canvas.getContext('2d');
  var W = canvas.width, H = canvas.height;
  var cx = W / 2, cy = H / 2;
  var baseR = 100; // base planet radius in pixels

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, W, H);

  var radius = p.BASE_DATA.radius || 200000;
  var formulas = (p.TERRAIN_DATA.terrainFormulaDifficulties && p.TERRAIN_DATA.terrainFormulaDifficulties.Normal) || [];
  var seed = (p.name || '').length;

  // Parse formula items to get amplitude multipliers
  var ampSum = 0;
  formulas.forEach(function(line){
    var parsed = parseFormulaLine(line);
    if (parsed && parsed.params.length >= 2){
      var amp = parseFloat(parsed.params[1]) || 0;
      ampSum += amp;
    }
  });
  var maxTerrainPx = Math.min(60, ampSum * 0.003 + 10); // scale to pixel range

  // Generate terrain heights using Perlin noise
  var N = 360;
  var heights = [];
  for (var i = 0; i < N; i++){
    var angle = (i / N) * Math.PI * 2;
    var nx = Math.cos(angle) * 2;
    var ny = Math.sin(angle) * 2;
    var n = _noise(nx, ny, seed, 4, 0.5); // 0~1
    // Add larger-scale variation
    var n2 = _noise(nx * 0.5, ny * 0.5, seed + 42, 2, 0.5);
    // Combine: base noise + secondary for variety
    var h = n * 0.7 + n2 * 0.3; // 0~1
    heights.push(h);
  }

  // Get reference heights (in meters)
  var atmoH = p.ATMOSPHERE_PHYSICS_DATA ? p.ATMOSPHERE_PHYSICS_DATA.height : 0;
  var twH = p.BASE_DATA.timewarpHeight || 0;
  var waterH = p.WATER_DATA ? (p.WATER_DATA.oceanDepth || 0) : 0;
  var ringStart = p.RINGS_DATA ? p.RINGS_DATA.startRadius : 0;
  var ringEnd = p.RINGS_DATA ? p.RINGS_DATA.endRadius : 0;

  // Scale factor: maps meters to pixels relative to baseR
  // radius meters = baseR pixels, so 1 pixel = radius/baseR meters
  var mToPx = baseR / radius;

  // Draw base circle (planet outline)
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.arc(cx, cy, baseR, 0, Math.PI * 2);
  ctx.stroke();

  // Draw terrain contour
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 1.2;
  ctx.setLineDash([]);
  ctx.beginPath();
  for (var i = 0; i <= N; i++){
    var idx = i % N;
    var angle = (idx / N) * Math.PI * 2 - Math.PI / 2; // start from top
    var r = baseR + heights[idx] * maxTerrainPx;
    var px = cx + Math.cos(angle) * r;
    var py = cy + Math.sin(angle) * r;
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fillStyle = 'rgba(0,0,0,0.03)';
  ctx.fill();
  ctx.stroke();

  // Dashed circle helper
  function dashedCircle(r_px, color, label){
    if (r_px < 2 || r_px > 300) return;
    ctx.strokeStyle = color;
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.arc(cx, cy, r_px, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Atmosphere height (red dashed)
  if (atmoH > 0){
    var atmoPx = baseR + atmoH * mToPx;
    dashedCircle(atmoPx, 'rgba(200,50,50,0.7)', '大气');
  }

  // Time warp height (blue dashed)
  if (twH > 0){
    var twPx = baseR + twH * mToPx;
    dashedCircle(twPx, 'rgba(50,80,200,0.7)', '时间加速');
  }

  // Water height (green dashed) - shown as ocean depth above surface
  if (waterH > 0){
    var waterPx = baseR + waterH * mToPx;
    dashedCircle(waterPx, 'rgba(40,160,60,0.7)', '水体');
  }

  // Rings (yellow dashed arcs)
  if (ringStart > 0 && ringEnd > ringStart){
    ctx.strokeStyle = 'rgba(200,180,40,0.6)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    // Ring inner arc (draw as full ellipse squashed for perspective feel)
    var ringStartPx = baseR + (ringStart - radius) * mToPx;
    var ringEndPx = baseR + (ringEnd - radius) * mToPx;
    // Draw arcs only in the "back" half to suggest rings
    if (ringStartPx > 5){
      ctx.beginPath();
      ctx.ellipse(cx, cy, ringStartPx, ringStartPx * 0.3, 0, Math.PI, Math.PI * 2);
      ctx.stroke();
    }
    if (ringEndPx > 5){
      ctx.beginPath();
      ctx.ellipse(cx, cy, ringEndPx, ringEndPx * 0.3, 0, Math.PI, Math.PI * 2);
      ctx.stroke();
    }
    // Front arcs
    if (ringStartPx > 5){
      ctx.beginPath();
      ctx.ellipse(cx, cy, ringStartPx, ringStartPx * 0.3, 0, 0, Math.PI);
      ctx.stroke();
    }
    if (ringEndPx > 5){
      ctx.beginPath();
      ctx.ellipse(cx, cy, ringEndPx, ringEndPx * 0.3, 0, 0, Math.PI);
      ctx.stroke();
    }
    ctx.setLineDash([]);
  }

  // Legend (bottom-right)
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'left';
  ctx.setLineDash([]);
  var legendX = W - 120;
  var legendY = H - 10;
  var legendItems = [];
  legendItems.push({ color: '#000', label: '行星轮廓', dash: false });
  legendItems.push({ color: '#000', label: '地形变化', dash: false });
  if (atmoH > 0) legendItems.push({ color: 'rgba(200,50,50,0.7)', label: '大气高度', dash: true });
  if (twH > 0) legendItems.push({ color: 'rgba(50,80,200,0.7)', label: '时间加速高度', dash: true });
  if (waterH > 0) legendItems.push({ color: 'rgba(40,160,60,0.7)', label: '水体高度', dash: true });
  if (ringStart > 0 && ringEnd > ringStart) legendItems.push({ color: 'rgba(200,180,40,0.6)', label: '光环', dash: true });

  for (var li = legendItems.length - 1; li >= 0; li--){
    var ly = legendY - li * 16;
    ctx.strokeStyle = legendItems[li].color;
    ctx.lineWidth = 1.5;
    if (legendItems[li].dash) ctx.setLineDash([3, 3]);
    else ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(legendX, ly - 4);
    ctx.lineTo(legendX + 16, ly - 4);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#111';
    ctx.fillText(legendItems[li].label, legendX + 20, ly);
  }
}

function regenTextureTab(){
  const canvas = document.getElementById('texTabCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const img = ctx.createImageData(W, H);
  const type = document.getElementById('texTabType').value;
  const seed = parseInt(document.getElementById('texTabSeed').value) || 1;
  const c1 = _hexToRgbObj(document.getElementById('texTabColor1').value);
  const c2 = _hexToRgbObj(document.getElementById('texTabColor2').value);
  const noiseStr = parseInt(document.getElementById('texTabNoise').value) / 100;
  const octaves = parseInt(document.getElementById('texTabDetail').value) || 4;
  for (let y = 0; y < H; y++){
    for (let x = 0; x < W; x++){
      const i = (y * W + x) * 4;
      let n = _noise(x / W, y / H, seed, octaves, 0.5);
      if (type === 'gas'){
        const bands = Math.sin(y / H * Math.PI * 6 + _noise(x / W, y / H, seed + 100, 3, 0.5) * 2) * 0.5 + 0.5;
        n = n * noiseStr + bands * (1 - noiseStr);
      } else if (type === 'ice'){
        n = n * 0.3 + 0.7;
      } else if (type === 'cloud'){
        n = n > 0.55 ? (n - 0.55) / 0.45 : 0;
      }
      const t = Math.max(0, Math.min(1, n));
      img.data[i] = Math.round(c1.r + (c2.r - c1.r) * t);
      img.data[i + 1] = Math.round(c1.g + (c2.g - c1.g) * t);
      img.data[i + 2] = Math.round(c1.b + (c2.b - c1.b) * t);
      img.data[i + 3] = 255;
    }
  }
  ctx.putImageData(img, 0, 0);
}

/* ============================================================
   EVENT BINDING
============================================================ */
function attachEventListeners(){
  const p = currentPlanet(); if (!p) return;
  const root = document.getElementById('tabContent');

  root.querySelectorAll('[data-path]').forEach(el => {
    el.addEventListener('input', e => {
      const path = e.target.dataset.path;
      let v;
      if (e.target.type === 'checkbox') v = e.target.checked;
      else if (e.target.type === 'number') v = e.target.value === '' ? 0 : parseFloat(e.target.value);
      else v = e.target.value;
      if (e.target.type === 'number' && isNaN(v)) v = 0;
      // pack-info / space-center fields are project-level (stored on state, not the planet)
      if (path.startsWith('packInfo.') || path.startsWith('spaceCenter.')) {
        setValueAtPath(state, path, v);
      } else {
        setValueAtPath(p, path, v);
        onPlanetChange(path);
      }
    });
  });

  root.querySelectorAll('[data-color-path]').forEach(el => {
    el.addEventListener('input', e => {
      const path = e.target.dataset.colorPath;
      const c = getValueAtPath(p, path);
      if (!c) return;
      const { r, g, b } = hexToRgb(e.target.value);
      c.r = r; c.g = g; c.b = b;
      const inputs = el.parentElement.querySelectorAll('.color-values input');
      if (inputs[0]) inputs[0].value = r;
      if (inputs[1]) inputs[1].value = g;
      if (inputs[2]) inputs[2].value = b;
      onPlanetChange(path);
    });
  });

  root.querySelectorAll('[data-array-path]').forEach(el => {
    el.addEventListener('input', e => {
      const path = e.target.dataset.arrayPath;
      const arr = e.target.value.split('\n').map(s => s.trim()).filter(s => s.length > 0);
      setValueAtPath(p, path, arr);
      onPlanetChange(path);
    });
  });

  // 结构化公式编辑器事件
  root.querySelectorAll('[data-formula-path]').forEach(function(container){
    var fpath = container.dataset.formulaPath;
    container.querySelectorAll('[data-formula-idx]').forEach(function(itemEl){
      attachFormulaItemListeners(itemEl, fpath);
    });
  });

  root.querySelectorAll('[data-enable-path]').forEach(el => {
    el.addEventListener('change', e => {
      const path = e.target.dataset.enablePath;
      if (e.target.checked){
        const def = JSON.parse(e.target.dataset.enableDefault);
        setValueAtPath(p, path, def);
      } else {
        setValueAtPath(p, path, null);
      }
      renderActiveTab();
      attachEventListeners();
      drawPreview();
      drawTerrainPreview();
      drawOrbitView();
      updateJsonPreview();
    });
  });

  root.querySelectorAll('[data-ppath]').forEach(el => {
    el.addEventListener('input', e => {
      const path = e.target.dataset.ppath;
      let v;
      if (e.target.type === 'checkbox') v = e.target.checked;
      else if (e.target.type === 'number') v = parseFloat(e.target.value) || 0;
      else v = e.target.value;
      setValueAtPath(state, path, v);
    });
  });
}

function duplicatePlanet(id){
  const i = state.planets.findIndex(p => p._id === id);
  if (i < 0) return;
  const copy = JSON.parse(JSON.stringify(state.planets[i]));
  copy._id = uid();
  let n = copy.name + '_copy', k = 1;
  while (state.planets.some(p => p.name === n)) n = copy.name + '_copy' + (++k);
  copy.name = n;
  state.planets.splice(i+1, 0, copy);
  state.activeId = copy._id;
  renderTree();
  renderEditor();
  showToast('已复制: ' + n);
}
function deletePlanet(id){
  const p = state.planets.find(x => x._id === id);
  if (!p) return;
  // collect descendants recursively by parent-name chain
  const toDelete = new Set([id]);
  let changed = true;
  while (changed){
    changed = false;
    const names = new Set();
    state.planets.forEach(q => { if (toDelete.has(q._id)) names.add(q.name); });
    state.planets.forEach(q => {
      if (names.has(q.ORBIT_DATA.parent) && !toDelete.has(q._id)){
        toDelete.add(q._id); changed = true;
      }
    });
  }
  const count = toDelete.size;
  if (!confirm('删除「'+p.name+'」及其 '+count+' 个子天体？')) return;
  state.planets = state.planets.filter(q => !toDelete.has(q._id));
  if (toDelete.has(state.activeId)) state.activeId = state.planets.length ? state.planets[0]._id : null;
  if (state.planets.length === 0){
    document.getElementById('editorContent').style.display = 'none';
    document.getElementById('emptyState').style.display = 'block';
  } else {
    renderEditor();
  }
  renderTree();
  showToast('已删除 '+count+' 个天体');
}

============================================================ */
function cleanPlanetForExport(p){
  const clone = JSON.parse(JSON.stringify(p));
  delete clone._id;
  delete clone._type;
  // remove null sections recursively
  (function rm(o){
    if (Array.isArray(o)){ o.forEach(rm); return; }
    if (o && typeof o === 'object'){
      for (const k of Object.keys(o)){
        if (o[k] === null) delete o[k];
        else rm(o[k]);
      }
    }
  })(clone);
  return clone;
}
function ensurePlanetShape(p){
  const skel = buildSkeleton(p.name || 'Imported', p.ORBIT_DATA && p.ORBIT_DATA.parent);
  const merged = deepMerge(skel, p);
  merged._id = uid();
  merged._type = (merged.ORBIT_DATA && !merged.ORBIT_DATA.parent) ? 'Center' : 'Planet';
  return merged;
}
function importFromText(){
  try {
    const text = document.getElementById('importText').value.trim();
    if (!text){ showToast('内容为空', 'error'); return; }
    const data = JSON.parse(text);

    state.planets.push(planet);
    state.activeId = planet._id;
    closeModal('importModal');
    renderTree();
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('editorContent').style.display = 'block';
    renderEditor();
    showToast('导入成功: ' + planet.name);
  } catch(e){
    showToast('导入失败: ' + e.message, 'error');
  }
}
function importPackFiles(event){
  const files = Array.from(event.target.files);
  if (files.length === 0) return;
  let ok = 0, fail = 0;
  let pending = files.length;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        const arr = Array.isArray(data) ? data : [data];
        arr.forEach(d => {
          const planet = ensurePlanetShape(d);
          state.planets.push(planet);
          ok++;
        });
      } catch(e){ fail++; }
      pending--;
      if (pending === 0){
        if (state.planets.length && !state.activeId) state.activeId = state.planets[state.planets.length-1]._id;
        renderTree();
        if (state.activeId){
          document.getElementById('emptyState').style.display = 'none';
          document.getElementById('editorContent').style.display = 'block';
          renderEditor();
        }
        showToast('导入完成: 成功 '+ok+'，失败 '+fail);
      }
    };
    reader.readAsText(file);
  });
  event.target.value = '';
}
function saveProject(){
  if (state.planets.length === 0){ showToast('没有天体可保存', 'error'); return; }
  const data = {
    type: 'sfs-planet-pack-project',
    appVersion: '1.0',
    savedAt: new Date().toISOString(),
    packInfo: state.packInfo,
    spaceCenter: state.spaceCenter,
    planets: state.planets
  };
  downloadFile((state.packInfo.name||'project').replace(/\s+/g,'_')+'.sfsproj', JSON.stringify(data, null, 2));
  showToast('项目已保存');
}
function openProject(event){
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.planets) throw new Error('无效的项目文件');
      state.planets = data.planets.map(p => {
        if (!p._id) p._id = uid();
        if (!p._type) p._type = (p.ORBIT_DATA && !p.ORBIT_DATA.parent) ? 'Center' : 'Planet';
        return p;
      });
      if (data.packInfo) Object.assign(state.packInfo, data.packInfo);
      if (data.spaceCenter) Object.assign(state.spaceCenter, data.spaceCenter);
      state.activeId = state.planets.length ? state.planets[0]._id : null;
      state.activeTab = 'base';
      state.expanded = {};
      renderTree();
      if (state.activeId){
        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('editorContent').style.display = 'block';
        renderEditor();
      } else {
        document.getElementById('editorContent').style.display = 'none';
        document.getElementById('emptyState').style.display = 'block';
      }
      showToast('项目已加载: '+state.planets.length+' 个天体');
    } catch(e){
      showToast('打开失败: ' + e.message, 'error');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}
function loadJSZip(){

    const script = document.createElement('script');

    script.onload = () => resolve(window.JSZip);
    script.onerror = () => reject(new Error('JSZip 加载失败'));
    document.head.appendChild(script);
  });
}

async function exportPlanetPack(){
  if (state.planets.length === 0){ showToast('没有天体可导出', 'error'); return; }
  // 纹理存在性检查
  const texNames = [];
  state.planets.forEach(p => {
    const td = p.TERRAIN_DATA && p.TERRAIN_DATA.TERRAIN_TEXTURE_DATA;
    if (td){
      if (td.planetTexture && td.planetTexture !== 'None') texNames.push(td.planetTexture);
      if (td.surfaceTexture_A && td.surfaceTexture_A !== 'None') texNames.push(td.surfaceTexture_A);
      if (td.surfaceTexture_B && td.surfaceTexture_B !== 'None') texNames.push(td.surfaceTexture_B);
      if (td.terrainTexture_C && td.terrainTexture_C !== 'None') texNames.push(td.terrainTexture_C);
    }
    const av = p.ATMOSPHERE_VISUALS_DATA;
    if (av){
      if (av.GRADIENT && av.GRADIENT.texture && av.GRADIENT.texture !== 'None') texNames.push(av.GRADIENT.texture);
      if (av.CLOUDS && av.CLOUDS.texture && av.CLOUDS.texture !== 'None') texNames.push(av.CLOUDS.texture);
    }
    const fc = p.FRONT_CLOUDS_DATA;
    if (fc && fc.cloudsTexture && fc.cloudsTexture !== 'None') texNames.push(fc.cloudsTexture);
    const r = p.RINGS_DATA;
    if (r && r.ringsTexture && r.ringsTexture !== 'None') texNames.push(r.ringsTexture);
    const w = p.WATER_DATA;
    if (w && w.oceanMaskTexture && w.oceanMaskTexture !== 'None') texNames.push(w.oceanMaskTexture);
  });
  const uniqueTex = [...new Set(texNames)];
  if (!confirm('以下纹理将被行星包引用（共 ' + uniqueTex.length + ' 个）：\n\n' + uniqueTex.join('\n') + '\n\n确认导出？')) return;
  try {
    const JSZip = await loadJSZip();
    const zip = new JSZip();
    const pi = state.packInfo;

    state.planets.forEach(p => {
      zip.file('Planet Data/' + p.name + '.txt', JSON.stringify(cleanPlanetForExport(p), null, 2));
    });
    zip.file('Import_Settings.txt', JSON.stringify({
      includeDefaultPlanets: pi.includeDefaultPlanets,
      includeDefaultHeightmaps: pi.includeDefaultHeightmaps,
      includeDefaultTextures: pi.includeDefaultTextures,
      hideStarsInAtmosphere: pi.hideStarsInAtmosphere,
      authorName: pi.authorName || 'n/a',
      version: pi.version || 'n/a',
      description: pi.description || 'n/a'
    }, null, 2));
    zip.file('Space_Center_Data.txt', JSON.stringify(state.spaceCenter, null, 2));
    zip.file('Version.txt', '1.6.00.18');
    zip.folder('Heightmap Data');
    zip.folder('Texture Data');

    const blob = await zip.generateAsync({ type: 'blob' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = (pi.name || 'MyPlanetPack') + '.zip';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 2000);
    showToast('已导出: ' + (pi.name || 'MyPlanetPack') + '.zip');
  } catch (e) {
    showToast('导出失败: ' + e.message, 'error');
  }
}
function downloadFile(filename, content){

  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();

}

/* ============================================================
   CANVAS 3D PREVIEW
============================================================ */
function drawPreview(){
  const canvas = document.getElementById('planetCanvas');
  if (!canvas) return;
  const p = currentPlanet(); if (!p) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2;
  const R = 110;
  ctx.clearRect(0,0,W,H);

  const mc = p.BASE_DATA.mapColor;
  const isStar = p._type === 'Center' && !p.TERRAIN_DATA.collider && mc.r > 0.8 && mc.g > 0.7;

  // Rings (back half)
  if (p.RINGS_DATA){
    drawRings(ctx, cx, cy, R, p, true);
  }

  // Atmosphere glow
  if (p.ATMOSPHERE_PHYSICS_DATA){
    const glowR = R + 26;
    const grad = ctx.createRadialGradient(cx, cy, R, cx, cy, glowR);
    grad.addColorStop(0, 'rgba('+Math.round(mc.r*255)+','+Math.round(mc.g*255)+','+Math.round(mc.b*255)+',0.35)');
    grad.addColorStop(1, 'rgba('+Math.round(mc.r*255)+','+Math.round(mc.g*255)+','+Math.round(mc.b*255)+',0)');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(cx, cy, glowR, 0, Math.PI*2); ctx.fill();
  }

  // Star corona
  if (isStar){
    const cg = ctx.createRadialGradient(cx, cy, R, cx, cy, R+40);
    cg.addColorStop(0, 'rgba(255,200,80,0.5)');
    cg.addColorStop(1, 'rgba(255,200,80,0)');
    ctx.fillStyle = cg;
    ctx.beginPath(); ctx.arc(cx, cy, R+40, 0, Math.PI*2); ctx.fill();
  }

  // Planet body with 3D shading (light from top-left)
  const light = lighten(mc, 0.35);
  const dark = darken(mc, 0.45);
  const bodyGrad = ctx.createRadialGradient(cx - R*0.35, cy - R*0.35, R*0.1, cx, cy, R);
  bodyGrad.addColorStop(0, 'rgb('+Math.round(light.r*255)+','+Math.round(light.g*255)+','+Math.round(light.b*255)+')');
  bodyGrad.addColorStop(0.55, 'rgb('+Math.round(mc.r*255)+','+Math.round(mc.g*255)+','+Math.round(mc.b*255)+')');
  bodyGrad.addColorStop(1, 'rgb('+Math.round(dark.r*255)+','+Math.round(dark.g*255)+','+Math.round(dark.b*255)+')');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI*2); ctx.fill();

  // Surface texture noise (clipped to body)
  ctx.save();
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI*2); ctx.clip();
  const seed = p.name.length;
  for (let i = 0; i < 42; i++){
    const a = (i*97 + seed*13) % 360;
    const d = ((i*53 + seed*7) % 100)/100 * R;
    const px = cx + Math.cos(a/180*Math.PI) * d;
    const py = cy + Math.sin(a/180*Math.PI) * d;
    const pr = ((i*31) % 18) + 4;
    const tint = ((i*17)%30)/100;
    ctx.fillStyle = 'rgba('+Math.round(dark.r*255)+','+Math.round(dark.g*255)+','+Math.round(dark.b*255)+','+(0.08+tint)+')';
    ctx.beginPath(); ctx.arc(px, py, pr, 0, Math.PI*2); ctx.fill();
  }
  // water sheen
  if (p.WATER_DATA){
    const wc = p.WATER_DATA.shallow;
    ctx.fillStyle = 'rgba('+Math.round(wc.r*255)+','+Math.round(wc.g*255)+','+Math.round(wc.b*255)+',0.35)';
    ctx.beginPath();
    ctx.ellipse(cx + R*0.1, cy + R*0.15, R*0.55, R*0.35, -0.4, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();

  // Specular highlight
  const spec = ctx.createRadialGradient(cx - R*0.4, cy - R*0.4, 0, cx - R*0.4, cy - R*0.4, R*0.5);
  spec.addColorStop(0, 'rgba(255,255,255,0.22)');
  spec.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.save();
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI*2); ctx.clip();
  ctx.fillStyle = spec; ctx.fillRect(cx-R, cy-R, R*2, R*2);
  ctx.restore();

  // Night-side shadow
  const sh = ctx.createRadialGradient(cx + R*0.55, cy + R*0.15, 0, cx + R*0.55, cy + R*0.15, R*1.5);
  sh.addColorStop(0, 'rgba(0,0,0,0.65)');
  sh.addColorStop(0.5, 'rgba(0,0,0,0.3)');
  sh.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.save();
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI*2); ctx.clip();
  ctx.fillStyle = sh; ctx.fillRect(cx-R, cy-R, R*2, R*2);
  ctx.restore();

  // Clouds
  if (p.ATMOSPHERE_VISUALS_DATA && p.ATMOSPHERE_VISUALS_DATA.CLOUDS){
    const ca = p.ATMOSPHERE_VISUALS_DATA.CLOUDS.alpha;
    if (ca > 0){
      ctx.save();
      ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI*2); ctx.clip();
      for (let i = 0; i < 7; i++){
        const a = (i*51 + seed*23) % 360;
        const d = ((i*37 + seed*11) % 80)/100 * R;
        const px = cx + Math.cos(a/180*Math.PI) * d;
        const py = cy + Math.sin(a/180*Math.PI) * d * 0.5;
        ctx.fillStyle = 'rgba(255,255,255,'+(ca*0.6)+')';
        ctx.beginPath();
        ctx.ellipse(px, py, ((i*13)%30)+15, ((i*7)%10)+5, a/180*Math.PI, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.restore();
    }
  }

  // Rings (front half)
  if (p.RINGS_DATA){
    drawRings(ctx, cx, cy, R, p, false);
  }

  updateJsonPreview();
}
function drawRings(ctx, cx, cy, R, p, back){
  const r = p.RINGS_DATA;
  const scale = R / p.BASE_DATA.radius;
  const rIn = Math.max(1, r.startRadius * scale);
  const rOut = Math.max(rIn+1, r.endRadius * scale);
  const mid = (rIn + rOut) / 2;
  const lw = Math.max(1, rOut - rIn);
  const tilt = 0.32;
  const col = r.mapColor;
  ctx.save();
  if (back){
    // back half: clip upper region (y < cy)
    ctx.beginPath(); ctx.rect(cx - rOut - 10, cy - rOut - 10, (rOut+10)*2, rOut+10); ctx.clip();
  } else {
    // front half: clip lower region (y > cy)
    ctx.beginPath(); ctx.rect(cx - rOut - 10, cy, (rOut+10)*2, rOut+10); ctx.clip();
  }
  ctx.strokeStyle = 'rgba('+Math.round(col.r*255)+','+Math.round(col.g*255)+','+Math.round(col.b*255)+','+col.a+')';
  ctx.lineWidth = lw;
  ctx.beginPath();
  ctx.ellipse(cx, cy, mid, mid*tilt, 0, 0, Math.PI*2);
  ctx.stroke();
  // inner gap line
  ctx.strokeStyle = 'rgba('+Math.round(col.r*255)+','+Math.round(col.g*255)+','+Math.round(col.b*255)+','+(col.a*0.4)+')';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.ellipse(cx, cy, mid - lw*0.3, (mid - lw*0.3)*tilt, 0, 0, Math.PI*2);
  ctx.stroke();
  ctx.restore();
}

/* ============================================================
   ASSET CACHE (IndexedDB)
============================================================ */
const DB_NAME = 'SFSAssetsDB';
const DB_VER = 1;
let _db = null;

function openAssetDB(){
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onerror = () => reject(req.error);
    req.onsuccess = () => { _db = req.result; resolve(_db); };
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('textures')) db.createObjectStore('textures', { keyPath: 'name' });
      if (!db.objectStoreNames.contains('presets')) db.createObjectStore('presets', { keyPath: 'name' });
    };
  });
}

async function countAssets(){
  if (!_db) await openAssetDB();
  const tx1 = _db.transaction('textures', 'readonly');
  const tx2 = _db.transaction('presets', 'readonly');
  const texCount = await tx1.objectStore('textures').count().then(r=>r,()=>0);
  const preCount = await tx2.objectStore('presets').count().then(r=>r,()=>0);
  state.assetCache = { textures: texCount, presets: preCount };
  updateAssetInfo();
}

function updateAssetInfo(){
  const el = document.getElementById('assetInfo');
  if (el) el.textContent = 'Assets: ' + state.assetCache.textures + ' textures, ' + state.assetCache.presets + ' presets';
}

  document.getElementById('assetModal').classList.add('active');
}

async function clearAssetCache(){
  if (!_db) await openAssetDB();
  const tx1 = _db.transaction('textures', 'readwrite');
  const tx2 = _db.transaction('presets', 'readwrite');
  await tx1.objectStore('textures').clear();
  await tx2.objectStore('presets').clear();
  state.assetCache = { textures: 0, presets: 0 };
  updateAssetInfo();
  showToast('资源缓存已清除');

}

async function saveTextureToCache(){

/* ============================================================
   TEXTURE CREATOR
============================================================ */
function _hash(x, y, seed){
  let h = seed + x * 374761393 + y * 668265263;
  h = (h ^ (h >> 13)) * 1274126177;
  return ((h ^ (h >> 16)) & 0x7fffffff) / 0x7fffffff;
}
function _noise(x, y, seed, octaves, persistence){
  let total = 0, frequency = 1, amplitude = 1, maxVal = 0;
  for (let i = 0; i < octaves; i++){
    const ix = Math.floor(x * frequency), iy = Math.floor(y * frequency);
    const fx = x * frequency - ix, fy = y * frequency - iy;
    const a = _hash(ix, iy, seed + i);
    const b = _hash(ix + 1, iy, seed + i);
    const c = _hash(ix, iy + 1, seed + i);
    const d = _hash(ix + 1, iy + 1, seed + i);
    const u = fx * fx * (3 - 2 * fx), v = fy * fy * (3 - 2 * fy);
    const n = a + (b - a) * u + (c - a) * v + (a - b - c + d) * u * v;
    total += n * amplitude;
    maxVal += amplitude;
    amplitude *= persistence;
    frequency *= 2;
  }
  return total / maxVal;
}
function _hexToRgbObj(hex){
  const n = parseInt(hex.slice(1), 16);
  return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
}

function showTextureCreator(){
  document.getElementById('textureModal').classList.add('active');
  setTimeout(regenTexture, 50);
}

function regenTexture(){
  const canvas = document.getElementById('texCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const img = ctx.createImageData(W, H);
  const type = document.getElementById('texType').value;
  const seed = parseInt(document.getElementById('texSeed').value) || 1;
  const c1 = _hexToRgbObj(document.getElementById('texColor1').value);
  const c2 = _hexToRgbObj(document.getElementById('texColor2').value);
  const noiseStr = parseInt(document.getElementById('texNoise').value) / 100;
  const octaves = parseInt(document.getElementById('texDetail').value) || 4;

  for (let y = 0; y < H; y++){
    for (let x = 0; x < W; x++){
      const i = (y * W + x) * 4;
      let n = _noise(x / W, y / H, seed, octaves, 0.5);
      if (type === 'gas'){
        const bands = Math.sin(y / H * Math.PI * 6 + _noise(x / W, y / H, seed + 100, 3, 0.5) * 2) * 0.5 + 0.5;
        n = n * noiseStr + bands * (1 - noiseStr);
      } else if (type === 'ice'){
        n = n * 0.3 + 0.7;
      } else if (type === 'cloud'){
        n = n > 0.55 ? (n - 0.55) / 0.45 : 0;
      }
      const t = Math.max(0, Math.min(1, n));
      img.data[i] = Math.round(c1.r + (c2.r - c1.r) * t);
      img.data[i + 1] = Math.round(c1.g + (c2.g - c1.g) * t);
      img.data[i + 2] = Math.round(c1.b + (c2.b - c1.b) * t);
      img.data[i + 3] = 255;
    }
  }
  ctx.putImageData(img, 0, 0);
}

/* ============================================================
   ORBIT VISUALIZER
============================================================ */
let _orbitCtx = null, _orbitCanvas = null, _orbitScale = 1, _orbitOffsetX = 0, _orbitOffsetY = 0, _orbitDragging = false, _orbitLastX = 0, _orbitLastY = 0;

function initOrbitCanvas(){
  const canvas = document.getElementById('orbitCanvas');
  if (!canvas) return;
  _orbitCanvas = canvas;
  _orbitCtx = canvas.getContext('2d');
  function _cc(e){
    const rect = canvas.getBoundingClientRect();
    return { x: (e.offsetX / rect.width) * canvas.width, y: (e.offsetY / rect.height) * canvas.height };
  }
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const factor = e.deltaY > 0 ? 0.9 : 1.1;
    const W = canvas.width, H = canvas.height;
    const {x: mx, y: my} = _cc(e);
    _orbitOffsetX = (mx - W / 2) * (1 - factor) + factor * _orbitOffsetX;
    _orbitOffsetY = (my - H / 2) * (1 - factor) + factor * _orbitOffsetY;
    _orbitScale *= factor;
    _orbitScale = Math.max(0.05, Math.min(20, _orbitScale));
    drawOrbitView();
  });
  canvas.addEventListener('mousedown', e => { _orbitDragging = true; const {x,y} = _cc(e); _orbitLastX = x; _orbitLastY = y; });
  canvas.addEventListener('mousemove', e => {
    const {x,y} = _cc(e);
    if (_orbitDragging){ _orbitOffsetX += x - _orbitLastX; _orbitOffsetY += y - _orbitLastY; _orbitLastX = x; _orbitLastY = y; drawOrbitView(); }
    else { hoverOrbitPlanet(x, y); }
  });
  canvas.addEventListener('mouseup', () => _orbitDragging = false);
  canvas.addEventListener('mouseleave', () => _orbitDragging = false);
  canvas.addEventListener('dblclick', e => { selectOrbitPlanet(_cc(e).x, _cc(e).y); });
}

function drawOrbitView(){
  const canvas = _orbitCanvas, ctx = _orbitCtx;
  if (!canvas || !ctx) return;
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // 根据视图模式过滤显示的天体
  const cp = currentPlanet();
  const mode = state._orbitViewMode || 'children';
  let visibleIds = new Set();
  if (cp && mode === 'children'){
    // 子天体视图：当前天体 + 所有后代
    visibleIds.add(cp._id);
    const _addDescendants = (parentId) => {
      state.planets.forEach(q => {
        if (q.ORBIT_DATA && q.ORBIT_DATA.parent && q.ORBIT_DATA.parent === state.planets.find(pp=>pp._id===parentId).name){
          visibleIds.add(q._id);
          _addDescendants(q._id);
        }
      });
    };
    _addDescendants(cp._id);
  } else if (cp && mode === 'parent'){
    // 父级视图：parent + 当前天体 + 所有同级天体
    const parentName = cp.ORBIT_DATA && cp.ORBIT_DATA.parent;
    const parent = parentName ? state.planets.find(q => q.name === parentName) : null;
    if (parent){
      visibleIds.add(parent._id);
      // parent自己的parent也加进来以便看到完整层级
      const grandName = parent.ORBIT_DATA && parent.ORBIT_DATA.parent;
      if (grandName){
        const grand = state.planets.find(q => q.name === grandName);
        if (grand) visibleIds.add(grand._id);
      }
    } else {
      // 当前天体是中心天体，显示全部
      state.planets.forEach(q => visibleIds.add(q._id));
    }
    // 所有以parent为parent的天体（同级）及其后代
    if (parent){
      state.planets.forEach(q => {
        if (q.ORBIT_DATA && q.ORBIT_DATA.parent === parent.name){
          visibleIds.add(q._id);
          // 也加上这些子天体的后代
          const _addDesc = (pid) => {
            state.planets.forEach(r => {
              if (r.ORBIT_DATA && r.ORBIT_DATA.parent && r.ORBIT_DATA.parent === state.planets.find(pp=>pp._id===pid).name){
                visibleIds.add(r._id);
                _addDesc(r._id);
              }
            });
          };
          _addDesc(q._id);
        }
      });
    }
  }
  // 如果没有过滤出任何天体，显示全部
  if (visibleIds.size === 0) state.planets.forEach(q => visibleIds.add(q._id));

  const positions = _computeOrbitPositions();
  const center = state.planets.find(p => p._type === 'Center');
  if (!center) return;
  const cx = W / 2 + _orbitOffsetX, cy = H / 2 + _orbitOffsetY;

  // Recompute scales for orbit drawing
  const orbitScales = {};
  const visiblePlanets = state.planets.filter(p => visibleIds.has(p._id));
  const allOrbits = visiblePlanets.filter(p => p.ORBIT_DATA && (p.ORBIT_DATA.semiMajorAxis || p.ORBIT_DATA.orbitData));
  const maxOrbit = Math.max(1, ...allOrbits.map(p => p.ORBIT_DATA.semiMajorAxis || p.ORBIT_DATA.orbitData || 100000));
  const globalScale = Math.min(W, H) * 0.38 * _orbitScale / maxOrbit;
  orbitScales[center._id] = globalScale;
  state.planets.forEach(p => {
    if (!visibleIds.has(p._id)) return;
    const od = p.ORBIT_DATA;
    if (!od || !od.parent) return;
    const parentBody = state.planets.find(q => q.name === od.parent);
    if (!parentBody) return;
    const parentScale = orbitScales[parentBody._id] || globalScale;
    orbitScales[p._id] = parentBody && parentBody._type !== 'Center' ? Math.max(globalScale * 0.15, parentScale * 0.25) : globalScale;
  });

  // Draw orbits
  visiblePlanets.forEach(p => {
    const od = p.ORBIT_DATA;
    if (!od || !od.parent) return;
    const parentBody = state.planets.find(q => q.name === od.parent);
    if (!parentBody) return;
    const parentPos = positions[parentBody._id];
    if (!parentPos) return;
    const sma = (od.semiMajorAxis || od.orbitData || 100000);
    const ecc = od.eccentricity || 0;
    const angle = od.argumentOfPeriapsis || 0;
    const scale = orbitScales[p._id] || globalScale;
    const a = sma * scale;
    const b = a * Math.sqrt(1 - ecc * ecc);
    ctx.save();
    ctx.translate(parentPos.x, parentPos.y);
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.ellipse(-a * ecc, 0, a, b, 0, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(150,150,150,0.25)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();
  });

  // Draw center star
  if (visibleIds.has(center._id)){
    const centerR = Math.max(4, Math.min(20, Math.log10(center.BASE_DATA.radius / 10000) * 3));
    ctx.beginPath(); ctx.arc(cx, cy, centerR, 0, Math.PI * 2);
    ctx.fillStyle = '#FFD700'; ctx.fill();
    ctx.shadowBlur = 15; ctx.shadowColor = '#FFD700'; ctx.fill(); ctx.shadowBlur = 0;
  }

  // Draw planets
  visiblePlanets.forEach(p => {
    if (p._type === 'Center') return;
    const pos = positions[p._id];
    if (!pos) return;
    const pr = Math.max(2, Math.min(10, Math.log10(p.BASE_DATA.radius / 1000) * 1.5));
    const mc = p.BASE_DATA.mapColor;
    ctx.beginPath(); ctx.arc(pos.x, pos.y, pr, 0, Math.PI * 2);
    ctx.fillStyle = 'rgb(' + Math.round(mc.r * 255) + ',' + Math.round(mc.g * 255) + ',' + Math.round(mc.b * 255) + ')';
    ctx.fill();
    ctx.fillStyle = '#333'; ctx.font = '10px sans-serif';
    ctx.fillText(p.name, pos.x + pr + 3, pos.y + 3);
  });
}

function _computeOrbitPositions(){
  const W = _orbitCanvas.width, H = _orbitCanvas.height;
  const cx = W / 2 + _orbitOffsetX, cy = H / 2 + _orbitOffsetY;
  const center = state.planets.find(p => p._type === 'Center');
  if (!center) return {};
  const positions = {}, orbitScales = {};
  const allOrbits = state.planets.filter(p => p.ORBIT_DATA && (p.ORBIT_DATA.semiMajorAxis || p.ORBIT_DATA.orbitData));
  const maxOrbit = Math.max(1, ...allOrbits.map(p => p.ORBIT_DATA.semiMajorAxis || p.ORBIT_DATA.orbitData || 100000));
  const globalScale = Math.min(W, H) * 0.38 * _orbitScale / maxOrbit;
  positions[center._id] = { x: cx, y: cy };
  orbitScales[center._id] = globalScale;
  let changed = true, iterations = 0;
  while (changed && iterations < 10){
    changed = false; iterations++;
    state.planets.forEach(p => {
      if (positions[p._id]) return;
      const od = p.ORBIT_DATA;
      if (!od || !od.parent) return;
      const parentBody = state.planets.find(q => q.name === od.parent);
      if (!parentBody) return;
      const parentPos = positions[parentBody._id];
      if (!parentPos) return;
      const parentScale = parentBody && parentBody._type !== 'Center' ? orbitScales[parentBody._id] * 0.15 : globalScale;
      orbitScales[p._id] = parentScale;
      const sma = (od.semiMajorAxis || od.orbitData || 100000);
      const ecc = od.eccentricity || 0;
      const angle = od.argumentOfPeriapsis || 0;
      const a = sma * parentScale;
      const b = a * Math.sqrt(1 - ecc * ecc);
      const pa = (state._orbitAnimPhase || 0) + (p._id.charCodeAt(2) % 360) * Math.PI / 180;
      const px = parentPos.x + Math.cos(pa) * a * Math.cos(angle) - Math.sin(pa) * b * Math.sin(angle) - a * ecc * Math.cos(angle);
      const py = parentPos.y + Math.cos(pa) * a * Math.sin(angle) + Math.sin(pa) * b * Math.cos(angle) - a * ecc * Math.sin(angle);
      positions[p._id] = { x: px, y: py };
      changed = true;
    });
  }
  return positions;
}

function selectOrbitPlanet(mx, my){
  const positions = _computeOrbitPositions();
  for (const p of state.planets){
    if (p._type === 'Center') continue;
    const pos = positions[p._id];
    if (!pos) continue;
    const pr = Math.max(2, Math.min(10, Math.log10(p.BASE_DATA.radius / 1000) * 1.5));
    const dx = mx - pos.x, dy = my - pos.y;
    if (dx * dx + dy * dy < (pr + 6) * (pr + 6)){
      selectPlanet(p._id);
      switchTab('base');
      showToast('已选中: ' + p.name);
      return;
    }
  }
}

function getTemplateModuleNames(){
  return ['Sun','Mercury','Venus','Earth','Mars','Jupiter','Saturn','Uranus','Neptune','Pluto','Moon','Phobos','Deimos','Io','Europa','Ganymede','Callisto','Titan','Enceladus','Mimas','Tethys','Dione','Rhea','Iapetus','Thebe','Pan','Miranda','Ariel','Umbriel','Titania','Oberon','Puck','Triton','Proteus','Naiad','Hydra','Nix','Charon','Ceres'];
}

// 从 TEMPLATES 构建一个完整的行星数据对象
function buildTemplateData(moduleName){
  const tpl = TEMPLATES.find(t => t.name === moduleName);
  if (!tpl) return null;
  return buildPlanetFromTemplate(tpl, moduleName, tpl.parent);
}

function importModuleFromTemplate(moduleName, dataKey){
  const tpl = TEMPLATES.find(t => t.name === moduleName);
  if (!tpl){ showToast('未找到模板: '+moduleName,'error'); return; }
  const merged = buildPlanetFromTemplate(tpl, moduleName, tpl.parent);
  const p = currentPlanet();
  if (p && merged[dataKey]){
    p[dataKey] = JSON.parse(JSON.stringify(merged[dataKey]));
    renderActiveTab(); attachEventListeners(); updateJsonPreview();
    showToast('已从 '+moduleName+' 导入 '+dataKey);
  } else {
    showToast('模板 '+moduleName+' 中没有 '+dataKey+' 数据','error');
  }
}

function showTemplateImportModal(dataKey){
  const names = getTemplateModuleNames();
  const listHtml = names.map(n =>
    '<div style="padding:6px 8px;border-bottom:1px solid var(--border);cursor:pointer;" '+
    'onmouseover="this.style.background=\'var(--surface-2)\'" onmouseout="this.style.background=\'transparent\'" '+
    'onclick="importModuleFromTemplate(\''+n+'\',\''+dataKey+'\');closeModal(\'templateImportModal\')">'+
    esc(n)+'</div>'
  ).join('');
  document.getElementById('templateImportList').innerHTML = listHtml;
  document.getElementById('templateImportModal').classList.add('active');
}
